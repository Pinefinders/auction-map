name: Update auction dates

on:
  schedule:
    # 02:19 UTC — odd, off-peak minute (avoids GitHub throttling runs queued
    # on top-of-hour slots). = 03:19 BST (summer) / 02:19 GMT (winter).
    - cron: "19 2 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button

# Allow the job to push commits back to the repo
permissions:
  contents: write

# Don't let two scheduled runs overlap
concurrency:
  group: auction-dates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape auction dates
        run: python scrape_map_dates.py --no-push

      - name: Commit & push dates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dates.json
          if git diff --cached --quiet; then
            echo "No changes to dates.json - nothing to commit."
          else
            git commit -m "Update auction dates ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git pull --rebase --autostash
            git push --force-with-lease
          fi
