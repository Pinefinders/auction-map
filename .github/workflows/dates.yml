name: Update auction dates

on:
  schedule:
    # 03:00 UK time. GitHub cron is UTC, so 02:00 UTC = 03:00 BST (summer)
    # and 02:00 UTC = 02:00 GMT (winter). Close enough for a pre-dawn refresh.
    - cron: "0 2 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button

# Allow the job to push commits back to the repo
permissions:
  contents: write

# Don't let two scheduled runs overlap
concurrency:
  group: auction-dates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape auction dates
        run: python scrape_map_dates.py --no-push

      - name: Commit & push dates.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dates.json
          if git diff --cached --quiet; then
            echo "No changes to dates.json - nothing to commit."
          else
            git commit -m "Update auction dates ($(date -u '+%Y-%m-%d %H:%M') UTC)"
            git push
          fi
