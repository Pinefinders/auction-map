<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinefinders — Auction House Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--pine:#3a5c3b;--pine-mid:#4e7a50;--pine-dark:#243626;--pine-xd:#162118;--cream:#f6f1e9;--warm:#e8dcc8;--amber:#c8912a;--amber-lt:#e5b54a;--ink:#1a1a18;--muted:#6b6459;--soon:#22c55e;--upcoming:#f5e642;--nodate:#888888}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;background:var(--pine-xd);touch-action:manipulation}

/* ── HEADER ── */
header{background:var(--pine-dark);border-bottom:1px solid rgba(255,255,255,.06);padding:0 14px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000}
header h1{font-family:'Playfair Display',serif;font-size:1rem;color:var(--amber-lt);white-space:nowrap}
.htag{font-size:.6rem;background:rgba(200,145,42,.15);color:var(--amber);border:1px solid rgba(200,145,42,.3);padding:2px 7px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;display:none}
@media(min-width:480px){.htag{display:inline}}
#updated-badge{font-size:.6rem;color:rgba(246,241,233,.35);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:2px 6px;white-space:nowrap}
.hright{font-size:.65rem;color:rgba(246,241,233,.4);display:none}
@media(min-width:600px){.hright{display:inline}}

/* ── TOOLBAR ── */
#toolbar{background:var(--pine-dark);border-bottom:1px solid rgba(255,255,255,.05);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
#toolbar::-webkit-scrollbar{display:none}
.tinput{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.8rem;padding:5px 12px;outline:none;width:160px;flex-shrink:0}
@media(min-width:400px){.tinput{width:190px}}
.tinput:focus{border-color:var(--amber)}
.tinput::placeholder{color:rgba(246,241,233,.3)}
.chip{font-size:.65rem;padding:4px 10px;border-radius:10px;border:1px solid;cursor:pointer;font-weight:500;transition:all .12s;user-select:none;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.chip-soon{border-color:#22c55e;color:#22c55e}.chip-soon.on{background:#22c55e;color:#fff}
.chip-2wk{border-color:var(--amber);color:var(--amber)}.chip-2wk.on{background:var(--amber);color:#fff}
.chip-urgent{border-color:#22c55e;color:#22c55e;font-weight:700}.chip-urgent.on{background:#22c55e;color:#162118;box-shadow:0 0 8px rgba(34,197,94,.5)}
.tbtn{font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;padding:5px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(246,241,233,.75);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent}
.tbtn:active{background:rgba(255,255,255,.18)}
#furn-btn{border-color:rgba(78,122,80,.5);color:var(--pine-mid)}
#furn-btn.on{background:rgba(78,122,80,.2);border-color:var(--pine-mid);color:#7ec87f}

/* ── MAP AREA ── */
#body{flex:1;position:relative;overflow:hidden}
#map{position:absolute;inset:0;background:#1a2a1b}

/* ── BOTTOM SHEET (mobile sidebar) ── */
#sheet{position:absolute;bottom:0;left:0;right:0;background:rgba(246,241,233,.98);border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.35);z-index:900;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(calc(100% - 52px));max-height:75vh}
#sheet.open{transform:translateY(0)}
#sheet-handle{padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:0;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
#sheet-handle-bar{width:36px;height:4px;background:rgba(58,92,59,.25);border-radius:2px;margin-bottom:6px}
#sheet-handle-row{display:flex;align-items:center;justify-content:space-between;width:100%;padding:0 14px 4px}
#sheet-title{font-family:'Playfair Display',serif;font-size:.85rem;color:var(--pine-dark);font-weight:700}
#sheet-count{font-size:.65rem;color:var(--muted)}
#sheet-search-row{padding:0 12px 8px;flex-shrink:0;border-bottom:1px solid rgba(200,191,175,.4)}
#sbsearch{width:100%;padding:7px 12px;border:1px solid #c8bfaf;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:.8rem;background:#fff;color:var(--ink);outline:none}
#sbsearch:focus{border-color:var(--pine-mid)}
#sblist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 0 20px}
#sblist::-webkit-scrollbar{width:3px}
#sblist::-webkit-scrollbar-thumb{background:#c8bfaf;border-radius:2px}
.si{padding:10px 14px;border-bottom:1px solid rgba(200,191,175,.3);cursor:pointer;-webkit-tap-highlight-color:transparent}
.si:active{background:rgba(200,191,175,.3)}
.si.on{background:rgba(58,92,59,.08);border-left:3px solid var(--pine-mid);padding-left:11px}
.si-name{font-size:.8rem;font-weight:600;color:var(--pine-dark);line-height:1.3;margin-bottom:2px}
.si-addr{font-size:.68rem;color:var(--muted);margin-bottom:3px}
.si-sales{display:flex;flex-direction:column;gap:2px}
.si-sale{font-size:.67rem;display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sdot-soon{background:#22c55e}.sdot-up{background:var(--upcoming)}.sdot-fut{background:var(--nodate)}
.sdate{font-weight:600;color:var(--pine)}
.no-sales{font-size:.65rem;color:#bbb;font-style:italic}

/* ── DESKTOP SIDEBAR (≥768px) ── */
@media(min-width:768px){
  #body{display:flex;flex-direction:row}
  #map{position:relative;flex:1}
  #sheet{position:relative;width:300px;border-radius:0;transform:none!important;max-height:none;box-shadow:none;border-left:1px solid var(--warm)}
  #sheet-handle{display:none}
  #sheet-search-row{padding:10px 12px;border-bottom:1px solid rgba(200,191,175,.4)}
  #sheet-handle-row{padding:10px 14px 4px}
}

/* ── POPUPS ── */
.leaflet-popup-content-wrapper{background:var(--pine-dark);color:var(--cream);border-radius:10px;box-shadow:0 6px 28px rgba(0,0,0,.5);padding:0;min-width:220px;max-width:280px}
.leaflet-popup-tip{background:var(--pine-dark)}
.leaflet-popup-content{margin:0}
.leaflet-popup-close-button{color:rgba(246,241,233,.4)!important;top:8px!important;right:10px!important;font-size:18px!important;width:24px!important;height:24px!important}
.pu{padding:14px 16px}
.pu-name{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--amber-lt);font-weight:700;margin-bottom:4px;line-height:1.3;padding-right:14px}
.pu-addr{font-size:.68rem;color:rgba(246,241,233,.5);margin-bottom:11px;line-height:1.5}
.pu-stitle{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(246,241,233,.3);margin-bottom:5px}
.pu-sales{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.pu-sale{background:rgba(255,255,255,.05);border-left:3px solid;border-radius:3px;padding:5px 8px}
.pu-sale.soon{border-color:#22c55e}.pu-sale.up{border-color:var(--upcoming)}.pu-sale.fut{border-color:var(--nodate)}
.pu-sdate{font-size:.75rem;font-weight:600;color:var(--cream)}
.pu-stime{font-size:.65rem;color:rgba(246,241,233,.5);margin-top:1px}
.pu-badge{display:inline-block;font-size:.58rem;padding:1px 5px;border-radius:8px;font-weight:600;margin-left:5px;vertical-align:middle}
.badge-soon{background:rgba(34,197,94,.15);color:#22c55e}
.badge-up{background:rgba(200,145,42,.15);color:var(--amber-lt)}
.badge-fut{background:rgba(136,136,136,.15);color:#aaa}
.pu-nosale{font-size:.7rem;color:rgba(246,241,233,.3);font-style:italic;margin-bottom:10px}
.pu-btn{display:block;text-align:center;background:var(--amber);color:var(--pine-dark);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:8px 12px;border-radius:6px;text-decoration:none;transition:background .15s}
.pu-btn:active{background:var(--amber-lt)}

/* ── LEGEND ── */
#legend{position:absolute;top:10px;right:10px;background:rgba(22,33,24,.92);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 11px;z-index:800;font-size:.65rem;color:rgba(246,241,233,.65);backdrop-filter:blur(4px)}
.leg-t{font-weight:600;margin-bottom:5px;color:var(--cream);letter-spacing:.05em;text-transform:uppercase;font-size:.58rem}
.leg-r{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.leg-d{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── PULSING PIN ── */
@keyframes pin-pulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.7),0 1px 5px rgba(0,0,0,.4)}
  60%{box-shadow:0 0 0 9px rgba(34,197,94,0),0 1px 5px rgba(0,0,0,.4)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0),0 1px 5px rgba(0,0,0,.4)}
}
.pin-soon{animation:pin-pulse 1.6s ease-out infinite}

/* ── HOVER TOOLTIP (desktop only) ── */
.auction-tooltip{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important}
.auction-tooltip::before{display:none!important}
.leaflet-tooltip.auction-tooltip{padding:0}
.tt-inner{background:var(--pine-dark);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:8px 12px;min-width:160px;max-width:240px;box-shadow:0 4px 16px rgba(0,0,0,.5);pointer-events:none}
.tt-name{font-family:'Playfair Display',serif;font-size:.82rem;color:var(--amber-lt);font-weight:700;margin-bottom:5px;line-height:1.3}
.tt-date{font-size:.72rem;font-weight:600;padding:2px 0}
.tt-date.soon{color:#22c55e}.tt-date.up{color:var(--upcoming)}.tt-date.fut{color:var(--amber-lt)}
.tt-nodate{font-size:.7rem;color:rgba(246,241,233,.35);font-style:italic}
.tt-more{font-size:.65rem;color:rgba(246,241,233,.4);margin-top:3px}
@media(max-width:767px){.auction-tooltip{display:none!important}}

/* ── ROUTE PLANNER PANEL ── */
#route-panel{
  position:absolute;top:10px;left:10px;
  background:var(--pine-dark);
  border:1px solid rgba(100,160,255,.2);
  border-radius:10px;
  width:290px;max-width:calc(100vw - 20px);
  z-index:900;
  box-shadow:0 6px 28px rgba(0,0,0,.5);
  display:none;
  overflow:hidden;
}
#route-panel.open{display:block}
#rp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:rgba(100,160,255,.08);
  border-bottom:1px solid rgba(100,160,255,.15);
}
#rp-title{font-size:.82rem;font-weight:600;color:#7ab4ff;letter-spacing:.02em}
#rp-close{background:none;border:none;color:rgba(246,241,233,.4);font-size:1rem;cursor:pointer;padding:0;line-height:1}
#rp-close:hover{color:var(--cream)}
#rp-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.rp-row{display:flex;flex-direction:column;gap:4px}
.rp-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:rgba(246,241,233,.4)}
.rp-input{
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:6px;
  color:var(--cream);
  font-family:'DM Sans',sans-serif;
  font-size:.8rem;
  padding:7px 10px;
  outline:none;
  width:100%;
}
.rp-input:focus{border-color:rgba(100,160,255,.6)}
.rp-input::placeholder{color:rgba(246,241,233,.25)}
.rp-key{font-family:monospace;font-size:.72rem;letter-spacing:.02em}
.rp-val{font-size:.78rem;font-weight:600;color:var(--cream);min-width:24px;text-align:right}
.rp-remember{font-size:.67rem;color:rgba(246,241,233,.45);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.rp-remember input{cursor:pointer;accent-color:#7ab4ff}
.rp-link{font-size:.65rem;color:rgba(100,160,255,.7);text-decoration:none}
.rp-link:hover{color:#7ab4ff}
#rp-go{
  background:#7ab4ff;color:var(--pine-xd);
  border:none;border-radius:6px;
  font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;
  padding:9px;cursor:pointer;transition:background .15s;
  width:100%;margin-top:2px;
}
#rp-go:hover{background:#a0c8ff}
#rp-go:disabled{opacity:.45;cursor:not-allowed}
#rp-status{font-size:.72rem;color:rgba(246,241,233,.5);min-height:18px;text-align:center}
#rp-results{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
#rp-results::-webkit-scrollbar{width:3px}
#rp-results::-webkit-scrollbar-thumb{background:rgba(100,160,255,.3);border-radius:2px}
.rr-item{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(100,160,255,.15);
  border-left:3px solid #7ab4ff;
  border-radius:5px;padding:7px 9px;cursor:pointer;transition:background .12s;
}
.rr-item:hover{background:rgba(100,160,255,.1)}
.rr-name{font-size:.78rem;font-weight:600;color:var(--cream);margin-bottom:2px}
.rr-meta{font-size:.65rem;color:rgba(246,241,233,.45);display:flex;gap:8px}
.rr-dist{color:#7ab4ff;font-weight:600}
.rr-date{color:var(--upcoming)}
.rr-date.soon{color:#22c55e}

#rp-hide-btn{
  width:100%;padding:6px;border-radius:5px;margin-top:-2px;
  font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .15s;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:rgba(246,241,233,.55);
}
#rp-hide-btn:hover{background:rgba(255,255,255,.1);color:var(--cream)}
#rp-hide-btn.hidden-state{background:rgba(255,200,50,.1);border-color:rgba(255,200,50,.3);color:#ffc832}

#rp-stops{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.rp-stop{display:flex;align-items:center;gap:5px;transition:opacity .15s}
.rp-stop.dragging{opacity:.4}
.rp-stop.drag-over{border-top:2px solid #7ab4ff}
.rp-drag{
  color:rgba(246,241,233,.2);font-size:1rem;cursor:grab;flex-shrink:0;
  padding:0 2px;line-height:1;user-select:none;touch-action:none;
}
.rp-drag:hover{color:rgba(100,160,255,.6)}
.rp-drag:active{cursor:grabbing}
.rp-stop-arrows{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.rp-arrow{
  background:none;border:none;color:rgba(246,241,233,.2);
  font-size:.5rem;cursor:pointer;padding:1px 2px;line-height:1;
  transition:color .1s;
}
.rp-arrow:hover{color:#7ab4ff}
.rp-stop-num{
  font-size:.65rem;font-weight:700;color:rgba(100,160,255,.7);
  min-width:16px;text-align:center;flex-shrink:0;
}
.rp-stop-input{flex:1;margin:0}
.rp-stop-del{
  background:none;border:none;color:rgba(246,241,233,.25);
  font-size:.85rem;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1;
  transition:color .12s;
}
.rp-stop-del:hover{color:#f87171}
.rp-add-btn{
  width:100%;padding:6px;border-radius:5px;margin-bottom:10px;
  font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .15s;
  background:rgba(100,160,255,.08);border:1px dashed rgba(100,160,255,.3);color:rgba(100,160,255,.7);
}
.rp-add-btn:hover{background:rgba(100,160,255,.15);color:#7ab4ff}
.rp-filter-btn{
  width:100%;padding:6px;border-radius:5px;font-family:'DM Sans',sans-serif;
  font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e;
}
.rp-filter-btn.on{background:#22c55e;color:#162118;border-color:#22c55e}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:10px">
    <h1>&#9670; Pinefinders</h1>
    <span class="htag">EasyLive UK</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="updated-badge">2 Apr 2026</span>
    <span class="hright" id="hright">Loading…</span>
  </div>
</header>
<div id="toolbar">
  <input id="tsearch" class="tinput" type="search" placeholder="🔍 Name, town or postcode…" autocomplete="off">
  <span class="chip chip-soon" id="chip-soon" onclick="setChip('soon')">This week</span>
  <span class="chip chip-2wk" id="chip-2wk" onclick="setChip('2wk')">2 weeks</span>
  <span class="chip chip-urgent" id="chip-urgent" onclick="setChip('urgent')">🟢 Now</span>
  <button class="tbtn" onclick="resetAll()">All</button>
  <button class="tbtn" id="furn-btn" onclick="toggleFurniture()">🪑 Furn</button>
  <button class="tbtn" id="route-btn" onclick="toggleRoutePanel()" style="border-color:rgba(100,160,255,.4);color:#7ab4ff">🗺 Route</button>
</div>
<div id="body">
  <div id="map"></div>

  <!-- Bottom sheet / desktop sidebar -->
  <div id="sheet">
    <div id="sheet-handle" onclick="toggleSheet()">
      <div id="sheet-handle-bar"></div>
      <div id="sheet-handle-row">
        <span id="sheet-title">Auction Houses</span>
        <span id="sheet-count">Loading…</span>
      </div>
    </div>
    <div id="sheet-search-row">
      <input id="sbsearch" type="search" placeholder="Filter list…" autocomplete="off">
    </div>
    <div id="sblist"></div>
  </div>

  <div id="legend">
    <div class="leg-t">Timing</div>
    <div class="leg-r"><div class="leg-d pin-soon" style="background:#22c55e"></div>≤3 days</div>
    <div class="leg-r"><div class="leg-d" style="background:var(--upcoming)"></div>Upcoming</div>
    <div class="leg-r"><div class="leg-d" style="background:var(--nodate)"></div>No date</div>
  </div>

  <!-- Route planner panel -->
  <div id="route-panel">
    <div id="rp-header">
      <span id="rp-title">🗺 Route Planner</span>
      <button id="rp-close" onclick="toggleRoutePanel()">✕</button>
    </div>
    <div id="rp-body">
      <div class="rp-label" style="margin-bottom:4px">Stops <span style="color:rgba(246,241,233,.3);font-weight:400;text-transform:none;letter-spacing:0">(in order)</span></div>
      <div id="rp-stops">
        <div class="rp-stop" data-index="0" draggable="true">
          <span class="rp-drag" title="Drag to reorder">⠿</span>
          <span class="rp-stop-num">1</span>
          <input class="rp-input rp-stop-input" type="text" placeholder="Start — e.g. Haddenham, Bucks" autocomplete="off">
          <div class="rp-stop-arrows">
            <button class="rp-arrow" onclick="moveStop(this,-1)" title="Move up">▲</button>
            <button class="rp-arrow" onclick="moveStop(this,1)" title="Move down">▼</button>
          </div>
          <button class="rp-stop-del" onclick="removeStop(this)" title="Remove">✕</button>
        </div>
        <div class="rp-stop" data-index="1" draggable="true">
          <span class="rp-drag" title="Drag to reorder">⠿</span>
          <span class="rp-stop-num">2</span>
          <input class="rp-input rp-stop-input" type="text" placeholder="End — e.g. Norwich, Norfolk" autocomplete="off">
          <div class="rp-stop-arrows">
            <button class="rp-arrow" onclick="moveStop(this,-1)" title="Move up">▲</button>
            <button class="rp-arrow" onclick="moveStop(this,1)" title="Move down">▼</button>
          </div>
          <button class="rp-stop-del" onclick="removeStop(this)" title="Remove">✕</button>
        </div>
      </div>
      <button class="rp-add-btn" onclick="addStop()">＋ Add location</button>
      <div class="rp-row">
        <label class="rp-label">Within</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input id="rp-radius" type="range" min="1" max="30" value="10" oninput="document.getElementById('rp-radius-val').textContent=this.value" style="flex:1">
          <span id="rp-radius-val" class="rp-val">10</span>
          <span class="rp-val">miles</span>
        </div>
      </div>
      <div class="rp-row">
        <label class="rp-label">ORS Key</label>
        <input id="rp-key" class="rp-input rp-key" type="password" placeholder="Paste your free API key…" autocomplete="off">

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

const today = new Date(); today.setHours(0,0,0,0);
const todayStr = today.toISOString().slice(0,10);

// Merge location + dates
let allH = ALL_HOUSES.map(h => ({
  ...h,
  sales: cleanSales(RAW_DATES[h.name] || [])
}));

let markers = {}, activeChip = 'all', auctionsHidden = false;
let routeLayer = null, routeHighlightLayer = null, routeResults = [], urgentOnly = false;
let dragSrc = null, _routeRefreshTimer = null;

function dft(d) { if(!d) return 9999; const x=new Date(d); x.setHours(0,0,0,0); return Math.round((x-today)/86400000); }
function sc(d)  { const n=dft(d); return n<0?'past':n<=3?'soon':n<=14?'up':'fut'; }
function fd(d)  { return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function mc(h) {
  const s = h.sales.filter(s => dft(s.date) >= 0);
  if (!s.length) return { color: '#888888', pulse: false };  // truly no date → grey
  const n = Math.min(...s.map(s => dft(s.date)));
  if (n <= 3)  return { color: '#22c55e', pulse: true };   // within 3 days → green pulsing
  if (n <= 14) return { color: '#f5e642', pulse: false };  // 4-14 days → amber
  return { color: '#f5e642', pulse: false };               // 14+ days but HAS a date → amber (not grey)
}

function mkIcon(color, sz=12, pulse=false){
  const isMobile = window.innerWidth < 768;
  const base = isMobile ? sz + 4 : sz;
  const size = pulse ? base + 4 : base;
  const cls = pulse ? 'pin-soon' : '';
  return L.divIcon({
    className: '',
    html: `<div class="${cls}" style="width:${size}px;height:${size}px;background:${color};border:2px solid #162118;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,.4)"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2+2]
  });
}

function buildPopup(h) {
  const s=h.sales.filter(s=>dft(s.date)>=0).slice(0,4);
  const sh=s.length?`<div class="pu-stitle">Upcoming Sales</div><div class="pu-sales">${s.map(x=>{
    const c=sc(x.date);
    const b=c==='soon'?'<span class="pu-badge badge-soon">Soon!</span>':c==='up'?'<span class="pu-badge badge-up">This month</span>':'<span class="pu-badge badge-fut">Scheduled</span>';
    return `<div class="pu-sale ${c}"><div class="pu-sdate">${fd(x.date)}${b}</div>${x.time?`<div class="pu-stime">${x.time}</div>`:''}</div>`;
  }).join('')}</div>`:`<p class="pu-nosale">No upcoming dates found</p>`;
  return `<div class="pu"><div class="pu-name">${h.name}</div><div class="pu-addr">${h.address}</div>${sh}<a class="pu-btn" href="${h.url}" target="_blank">View on EasyLive ↗</a></div>`;
}

function buildTooltip(h) {
  const s = h.sales.filter(s => dft(s.date) >= 0).slice(0, 3);
  const next = s[0] || null;
  const nextLine = next
    ? `<div class="tt-date ${sc(next.date)}">${fd(next.date)}${next.time ? ' · ' + next.time : ''}</div>`
    : `<div class="tt-nodate">No upcoming dates</div>`;
  const more = s.length > 1 ? `<div class="tt-more">+${s.length-1} more sale${s.length>2?'s':''}</div>` : '';
  return `<div class="tt-inner"><div class="tt-name">${h.name}</div>${nextLine}${more}</div>`;
}

function addMarker(h){
  if(!h.lat) return;
  const {color, pulse} = mc(h);
  const m=L.marker([h.lat,h.lng],{icon:mkIcon(color, 12, pulse)});
  m.bindPopup(L.popup({maxWidth:290}).setContent(buildPopup(h)));
  m.bindTooltip(buildTooltip(h), {
    permanent: false,
    sticky: false,
    direction: 'top',
    offset: [0, -8],
    className: 'auction-tooltip'
  });
  m.on('click',()=>{
    hlSB(h.name);
    if(window.innerWidth < 768) closeSheet();
  });
  m.addTo(map);
  markers[h.name]=m;
}

function refreshMarkers(){
  allH.forEach(h=>{
    const m=markers[h.name];
    if(!m) return;
    const {color, pulse} = mc(h);
    m.setIcon(mkIcon(color, 12, pulse));
    m.setPopupContent(buildPopup(h));
    m.setTooltipContent(buildTooltip(h));
  });
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function buildSB(houses){
  const list=document.getElementById('sblist');
  const cnt=document.getElementById('sheet-count');
  list.innerHTML='';
  let vis=houses;
  if(activeChip==='soon')   vis=houses.filter(h=>h.sales.some(s=>dft(s.date)>=0&&dft(s.date)<=7));
  else if(activeChip==='2wk')    vis=houses.filter(h=>h.sales.some(s=>dft(s.date)>=0&&dft(s.date)<=14));
  else if(activeChip==='urgent') vis=houses.filter(h=>h.sales.some(s=>dft(s.date)>=0&&dft(s.date)<=3));
  cnt.textContent=`${vis.length} houses · ${vis.filter(h=>h.sales.some(s=>dft(s.date)>=0)).length} with dates`;
  const visNames = new Set(vis.map(h => h.name));
  allH.forEach(h=>{
    const m=markers[h.name];
    if(!m) return;
    if(auctionsHidden) return;
    visNames.has(h.name) ? m.addTo(map) : m.remove();
  });
  vis.forEach(h=>{
    const fs=h.sales.filter(s=>dft(s.date)>=0).slice(0,3);
    const sh=fs.length?fs.map(s=>{const c=sc(s.date);return`<div class="si-sale"><div class="sdot sdot-${c}"></div><span class="sdate">${fd(s.date)}</span>${s.time?`<span class="stitle">${s.time}</span>`:''}</div>`;}).join(''):`<div class="no-sales">No upcoming dates</div>`;
    const d=document.createElement('div');
    d.className='si'; d.dataset.name=h.name;
    d.innerHTML=`<div class="si-name">${h.name}</div><div class="si-addr">${h.address.replace(' United Kingdom','').substring(0,60)}</div><div class="si-sales">${sh}</div>`;
    d.addEventListener('click',()=>{
      const m=markers[h.name];
      if(m){
        if(window.innerWidth < 768){
          // On mobile: close sheet first, then fly to pin and open popup
          closeSheet();
          setTimeout(()=>{
            map.setView(m.getLatLng(), 13, {animate:true});
            m.openPopup();
          }, 50);
        } else {
          map.setView(m.getLatLng(), 13, {animate:true});
          m.openPopup();
          hlSB(h.name);
        }
      }
    });
    list.appendChild(d);
  });
}

function hlSB(name){
  document.querySelectorAll('.si').forEach(e=>e.classList.remove('on'));
  const el=document.querySelector(`.si[data-name="${CSS.escape(name)}"]`);
  if(el){
    el.classList.add('on');
    // Only scroll into view on desktop — on mobile the sheet closes anyway
    if(window.innerWidth >= 768) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function filteredH(){
  const q=(document.getElementById('sbsearch').value||'').toLowerCase();
  return allH.filter(h=>{
    if(furnitureFilter && NON_FURNITURE.has(h.name)) return false;
    if(!q) return true;
    return h.name.toLowerCase().includes(q)||h.address.toLowerCase().includes(q)||(h.postcode||'').toLowerCase().includes(q);
  });
}

function setChip(mode){
  activeChip = activeChip===mode ? 'all' : mode;
  document.getElementById('chip-soon').classList.toggle('on', activeChip==='soon');
  document.getElementById('chip-2wk').classList.toggle('on', activeChip==='2wk');
  document.getElementById('chip-urgent').classList.toggle('on', activeChip==='urgent');
  buildSB(filteredH());
}

function resetAll(){
  document.getElementById('sbsearch').value='';
  document.getElementById('tsearch').value='';
  activeChip='all';
  document.getElementById('chip-soon').classList.remove('on');
  document.getElementById('chip-2wk').classList.remove('on');
  document.getElementById('chip-urgent').classList.remove('on');
  buildSB(filteredH());
}

document.getElementById('sbsearch').addEventListener('input',()=>buildSB(filteredH()));
document.getElementById('tsearch').addEventListener('input',function(){document.getElementById('sbsearch').value=this.value;buildSB(filteredH());});

// On mobile: close sheet when tapping the map background (not a pin)
map.on('click', ()=>{ if(window.innerWidth < 768) closeSheet(); });
map.on('popupopen', ()=>{ if(window.innerWidth < 768) closeSheet(); });

// ── MULTI-STOP MANAGEMENT ────────────────────────────────────────────────────
function renumberStops() {
  const rows = [...document.querySelectorAll('.rp-stop')];
  const n = rows.length;
  rows.forEach((row, i) => {
    row.querySelector('.rp-stop-num').textContent = i + 1;
    const input = row.querySelector('.rp-stop-input');
    if (i === 0)      input.placeholder = 'Start — e.g. Haddenham, Bucks';
    else if (i===n-1) input.placeholder = 'End destination';
    else              input.placeholder = `Stop ${i + 1}`;
    row.querySelector('.rp-stop-del').style.visibility = n <= 2 ? 'hidden' : 'visible';
    const arrows = row.querySelectorAll('.rp-arrow');
    arrows[0].style.visibility = i === 0   ? 'hidden' : 'visible';
    arrows[1].style.visibility = i === n-1 ? 'hidden' : 'visible';
  });
  // Live-refresh the route if one is already drawn
  debouncedRefreshRoute();
}

function debouncedRefreshRoute() {
  // Only re-run if a route is already on the map
  if (!routeLayer) return;
  clearTimeout(_routeRefreshTimer);
  _routeRefreshTimer = setTimeout(() => {
    const key = document.getElementById('rp-key').value.trim();
    if (key) planRoute();
  }, 800); // 800ms after last change
}

function addStop() {
  const stops = document.getElementById('rp-stops');
  const count = stops.querySelectorAll('.rp-stop').length;
  const row = document.createElement('div');
  row.className = 'rp-stop';
  row.draggable = true;
  row.innerHTML = `
    <span class="rp-drag" title="Drag to reorder">⠿</span>
    <span class="rp-stop-num">${count + 1}</span>
    <input class="rp-input rp-stop-input" type="text" placeholder="Stop ${count + 1}" autocomplete="off">
    <div class="rp-stop-arrows">
      <button class="rp-arrow" onclick="moveStop(this,-1)" title="Move up">▲</button>
      <button class="rp-arrow" onclick="moveStop(this,1)" title="Move down">▼</button>
    </div>
    <button class="rp-stop-del" onclick="removeStop(this)" title="Remove">✕</button>`;
  stops.appendChild(row);
  initDragRow(row);
  initStopInput(row.querySelector('input'));
  renumberStops();
  row.querySelector('input').focus();
}

function removeStop(btn) {
  const stops = document.getElementById('rp-stops');
  if (stops.querySelectorAll('.rp-stop').length <= 2) return;
  btn.closest('.rp-stop').remove();
  renumberStops();
}

function moveStop(btn, dir) {
  const row = btn.closest('.rp-stop');
  const stops = document.getElementById('rp-stops');
  const rows = [...stops.querySelectorAll('.rp-stop')];
  const i = rows.indexOf(row);
  const target = rows[i + dir];
  if (!target) return;
  if (dir === -1) stops.insertBefore(row, target);
  else            stops.insertBefore(target, row);
  renumberStops();
}

// ── DRAG TO REORDER ──────────────────────────────────────────────────────────
function initDragRow(row) {
  row.addEventListener('dragstart', e => {
    dragSrc = row;
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    document.querySelectorAll('.rp-stop').forEach(r => r.classList.remove('drag-over'));
  });
  row.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.rp-stop').forEach(r => r.classList.remove('drag-over'));
    if (row !== dragSrc) row.classList.add('drag-over');
  });
  row.addEventListener('drop', e => {
    e.preventDefault();
    if (!dragSrc || dragSrc === row) return;
    const stops = document.getElementById('rp-stops');
    const rows = [...stops.querySelectorAll('.rp-stop')];
    const fromI = rows.indexOf(dragSrc);
    const toI   = rows.indexOf(row);
    if (fromI < toI) stops.insertBefore(dragSrc, row.nextSibling);
    else             stops.insertBefore(dragSrc, row);
    row.classList.remove('drag-over');
    renumberStops();
  });
}

// Init drag on existing rows
document.querySelectorAll('.rp-stop').forEach(initDragRow);

// Refresh route when stop text changes (after pause in typing)
function initStopInput(input) {
  input.addEventListener('input', () => debouncedRefreshRoute());
}
document.querySelectorAll('.rp-stop-input').forEach(initStopInput);

// Initialise arrow/del visibility
renumberStops();
function toggleAuctionMarkers() {
  auctionsHidden = !auctionsHidden;
  const btn = document.getElementById('rp-hide-btn');
  Object.values(markers).forEach(m => {
    if (auctionsHidden) m.remove();
    else m.addTo(map);
  });
  btn.classList.toggle('hidden-state', auctionsHidden);
  btn.textContent = auctionsHidden ? '👁 Show auctions on map' : '👁 Hide auctions from map';
}

function toggleRoutePanel() {
  const p = document.getElementById('route-panel');
  p.classList.toggle('open');
  document.getElementById('route-btn').classList.toggle('on', p.classList.contains('open'));
  // Restore hidden markers if panel is being closed
  if (!p.classList.contains('open') && auctionsHidden) toggleAuctionMarkers();
}

function toggleUrgentFilter() {
  urgentOnly = !urgentOnly;
  const btn = document.getElementById('rp-urgent-btn');
  btn.classList.toggle('on', urgentOnly);
  btn.textContent = urgentOnly ? '🟢 Showing this week only — show all' : '🟢 Show this week only';

  // Build a set of names that are in the urgent results
  const urgentNames = new Set(
    routeResults
      .filter(r => r.nextSale && dft(r.nextSale.date) <= 3)
      .map(r => r.h.name)
  );

  // Show/hide map markers accordingly
  routeResults.forEach(({ h }) => {
    const m = markers[h.name];
    if (!m) return;
    if (urgentOnly) {
      urgentNames.has(h.name) ? m.addTo(map) : m.remove();
    } else {
      m.addTo(map); // restore all route results
    }
  });

  renderRouteResults();
}

function renderRouteResults() {
  const res = document.getElementById('rp-results');
  res.innerHTML = '';
  const list = urgentOnly
    ? routeResults.filter(r => r.nextSale && dft(r.nextSale.date) <= 3)
    : routeResults;

  if (urgentOnly && !list.length) {
    res.innerHTML = '<div style="font-size:.72rem;color:rgba(246,241,233,.4);text-align:center;padding:8px">No auctions within 3 days on this route</div>';
    return;
  }

  for (const { h, dist, nextSale } of list) {
    const dateStr = nextSale
      ? `<span class="rr-date ${sc(nextSale.date)}">${fd(nextSale.date)}${nextSale.time ? ' · '+nextSale.time : ''}</span>`
      : '<span style="color:rgba(246,241,233,.3);font-style:italic">No upcoming dates</span>';
    const el = document.createElement('div');
    el.className = 'rr-item';
    el.innerHTML = `
      <div class="rr-name">${h.name}</div>
      <div class="rr-meta">
        <span class="rr-dist">~${dist} mi</span>
        ${dateStr}
      </div>`;
    el.addEventListener('click', () => {
      const m = markers[h.name];
      if (m) { map.setView(m.getLatLng(), 14, {animate:true}); m.openPopup(); }
      if (window.innerWidth < 768) toggleRoutePanel();
    });
    res.appendChild(el);
  }
}

// Geocode a place name via ORS
async function geocode(place, key) {
  const url = `https://api.openrouteservice.org/geocode/search?api_key=${key}&text=${encodeURIComponent(place)}&boundary.country=GB&size=1`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Geocoding failed');
  const d = await r.json();
  if (!d.features?.length) throw new Error(`Can't find "${place}" — try adding a county`);
  const [lng, lat] = d.features[0].geometry.coordinates;
  return [lat, lng];
}

// Fetch route from ORS, returns array of [lat,lng] points
async function fetchRoute(coordsArray, key) {
  const url = 'https://api.openrouteservice.org/v2/directions/driving-car/geojson';
  // ORS expects [lng, lat] pairs
  const coordinates = coordsArray.map(ll => [ll[1], ll[0]]);
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': key, 'Content-Type': 'application/json' },
    body: JSON.stringify({ coordinates, instructions: false })
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Route request failed — check your API key');
  }
  const d = await r.json();
  return d.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
}

// Haversine distance in miles between two [lat,lng] points
function haversine(a, b) {
  const R = 3958.8, toR = Math.PI/180;
  const dLat = (b[0]-a[0])*toR, dLng = (b[1]-a[1])*toR;
  const x = Math.sin(dLat/2)**2 + Math.cos(a[0]*toR)*Math.cos(b[0]*toR)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

// Minimum distance from point P to the route polyline
function distToRoute(p, route) {
  let min = Infinity;
  for (const pt of route) min = Math.min(min, haversine(p, pt));
  return min;
}

async function planRoute() {
  const stops = [...document.querySelectorAll('.rp-stop-input')].map(i => i.value.trim()).filter(Boolean);
  const radius = parseInt(document.getElementById('rp-radius').value);
  const key    = document.getElementById('rp-key').value.trim();
  const goBtn  = document.getElementById('rp-go');

  if (stops.length < 2)  { setStatus('Add at least a start and end location.', '#f87171'); return; }
  if (!key)              { setStatus('Paste your free ORS API key first.', '#f87171'); return; }

  try { if (document.getElementById('rp-remember').checked) localStorage.setItem('ors_api_key', key); } catch(e) {}

  goBtn.disabled = true;
  document.getElementById('rp-results').innerHTML = '';
  document.getElementById('rp-filter-row').style.display = 'none';
  routeResults = []; urgentOnly = false;

  if (routeLayer)          { map.removeLayer(routeLayer); routeLayer = null; }
  if (routeHighlightLayer) { map.removeLayer(routeHighlightLayer); routeHighlightLayer = null; }
  // Remove old stop markers
  if (window._stopMarkers) { window._stopMarkers.forEach(m => map.removeLayer(m)); }
  window._stopMarkers = [];

  try {
    const coords = [];
    for (let i = 0; i < stops.length; i++) {
      setStatus(`📍 Locating stop ${i+1} of ${stops.length}…`);
      coords.push(await geocode(stops[i], key));
    }

    setStatus(`🛣 Routing through ${stops.length} stops…`);
    const route = await fetchRoute(coords, key);

    routeLayer = L.polyline(route, { color:'#7ab4ff', weight:4, opacity:0.7 }).addTo(map);
    routeHighlightLayer = L.polyline(route, { color:'#7ab4ff', weight:radius*3, opacity:0.06 }).addTo(map);

    // Numbered stop markers — start gets S, end gets E, deliveries numbered from 1
    coords.forEach((ll, i) => {
      const isStart = i === 0;
      const isEnd   = i === coords.length - 1;
      const label   = isStart ? 'S' : isEnd && coords.length > 2 ? 'E' : String(i); // stop 2 = 1, stop 3 = 2 etc
      const bg      = isStart ? '#22c55e' : isEnd && coords.length > 2 ? '#f87171' : '#7ab4ff';
      const m = L.marker(ll, {
        icon: L.divIcon({
          className: '',
          html: `<div style="background:${bg};color:#162118;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;border:2px solid #162118;box-shadow:0 2px 6px rgba(0,0,0,.4)">${label}</div>`,
          iconSize:[22,22], iconAnchor:[11,11]
        })
      }).bindTooltip(stops[i], {direction:'top', offset:[0,-14]}).addTo(map);
      window._stopMarkers.push(m);
    });

    map.fitBounds(routeLayer.getBounds(), { padding:[30,30] });

    // Show the hide auctions button now we have a route
    const hideBtn = document.getElementById('rp-hide-btn');
    hideBtn.style.display = 'block';
    // If auctions were hidden from a previous route, restore them
    if (auctionsHidden) { toggleAuctionMarkers(); }
    // If urgent filter was on from a previous route, restore all markers
    if (urgentOnly) { urgentOnly = false; Object.values(markers).forEach(m => m.addTo(map)); }
    setStatus('🔍 Finding nearby auction houses…');

    const houses = filteredH();
    const nearby = [];
    for (const h of houses) {
      if (!h.lat) continue;
      const dist = distToRoute([h.lat, h.lng], route);
      if (dist <= radius) {
        const nextSale = h.sales.filter(s => dft(s.date) >= 0)[0] || null;
        nearby.push({ h, dist: Math.round(dist*10)/10, nextSale });
      }
    }

    nearby.sort((a,b) => {
      const d = (a.nextSale?0:1) - (b.nextSale?0:1);
      return d !== 0 ? d : a.dist - b.dist;
    });

    if (!nearby.length) {
      setStatus(`No auction houses within ${radius} miles of this route.`, 'rgba(246,241,233,.4)');
      return;
    }

    setStatus(`Found ${nearby.length} auction ${nearby.length===1?'house':'houses'} within ${radius} miles`, '#22c55e');

    routeResults = nearby;
    urgentOnly = false;
    document.getElementById('rp-urgent-btn').classList.remove('on');
    document.getElementById('rp-urgent-btn').textContent = '🟢 Show this week only';
    const hasUrgent = nearby.some(r => r.nextSale && dft(r.nextSale.date) <= 3);
    document.getElementById('rp-filter-row').style.display = hasUrgent ? 'block' : 'none';
    renderRouteResults();

  } catch(e) {
    setStatus('⚠ ' + e.message, '#f87171');
  } finally {
    goBtn.disabled = false;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
